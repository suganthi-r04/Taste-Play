<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Recipes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
    background: url('dinner.jpg') no-repeat center center fixed;
    background-size: cover;
    position: relative;
    transition: color 0.3s;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    backdrop-filter: blur(6px);
    background-color: rgba(255,255,255,0.2);
    pointer-events: none;
    z-index: 0;
    transition: background-color 0.3s;
  }

  body > * { position: relative; z-index: 1; }

  h1 { color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.6); }

  .items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 60px; /* leaves space for search bar */
    text-align: center;
  }

  .item {
    background: rgba(255, 255, 255, 0.85);
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.2s, background 0.3s, color 0.3s;
  }

  .item:hover {
    transform: scale(1.05);
    background: rgba(255,245,240,0.95);
  }

  a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    transition: background 0.3s, color 0.3s;
  }

  a:hover { background: #45a049; }

  .search-container {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1000;
  }

  #searchBar {
    padding: 8px 12px;
    width: 200px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  /* Dark mode */
  .dark-mode::after { background-color: rgba(0,0,0,0.4); filter: blur(5px) brightness(0.6); }
  .dark-mode h1 { color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
  .dark-mode .item { background: rgba(50,50,50,0.8); color: #fff; }
  .dark-mode .item:hover { background: rgba(70,70,70,0.85); }
  .dark-mode a { color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
</style>
</head>
<body>

<div class="container">
  <h1>🍕 Dinner Recipes</h1>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="searchBar" placeholder="Search dinner recipes..." onkeyup="searchDinner()" />
  </div>

  <!-- Recipe List -->
  <div id="dinnerList" class="items"></div>

  <a href="home.html" onclick="playClick()">⬅ Back to Home</a>
</div>

<audio id="click-sound" src="click.mp3" preload="auto"></audio>

<script>
const dinnerRecipes = {
  pizza: { title: "Pizza", img: "dinner.jpg" },
  curry: { title: "Curry", img: "dinner.jpg" },
  noodles: { title: "Noodles", img: "dinner.jpg" },
  grilledchicken: { title: "Grilled Chicken", img: "dinner.jpg" },
  steak: { title: "Steak", img: "dinner.jpg" },
  soup: { title: "Soup", img: "dinner.jpg" },
  chickenparmesan: { title: "Chicken Parmesan", img: "dinner.jpg" },
  spaghettibolognese: { title: "Spaghetti Bolognese", img: "dinner.jpg" },
  fajitas: { title: "Fajitas", img: "dinner.jpg" },
  tacobowl: { title: "Taco Bowl", img: "dinner.jpg" },
  grilledsalmon: { title: "Grilled Salmon", img: "dinner.jpg" },
  chickenalfredo: { title: "Chicken Alfredo", img: "dinner.jpg" },
  beefstirfry: { title: "Beef Stir Fry", img: "dinner.jpg" },
  chickenparatha: { title: "Chicken Paratha", img: "dinner.jpg" },
  paneertikka: { title: "Paneer Tikka Masala", img: "dinner.jpg" },
  vegmanchurian: { title: "Veg Manchurian", img: "dinner.jpg" },
  fishcurry: { title: "Fish Curry", img: "dinner.jpg" },
  chickenfajita: { title: "Chicken Fajita", img: "dinner.jpg" }
};

const dinnerList = document.getElementById('dinnerList');

// Generate recipe items dynamically
for (let key in dinnerRecipes) {
  const recipe = dinnerRecipes[key];
  const div = document.createElement('div');
  div.className = "item";
  div.textContent = recipe.title;
  div.onclick = () => { playClick(); openRecipe(key); };
  dinnerList.appendChild(div);
}

// Search function
function searchDinner() {
  const input = document.getElementById('searchBar').value.toLowerCase();
  const items = document.querySelectorAll('#dinnerList .item');

  items.forEach(item => {
    const recipeName = item.textContent.toLowerCase();
    item.style.display = recipeName.includes(input) ? "block" : "none";
  });
}

// Click sound & recipe navigation
function playClick() {
  const sound = document.getElementById("click-sound");
  sound.currentTime = 0;
  sound.play();
}

function openRecipe(item) {
  localStorage.setItem("selectedRecipe", item);
  window.location.href = "recipe.html";
}
</script>

<script src="dark-mode.js"></script>
</body>
</html>
