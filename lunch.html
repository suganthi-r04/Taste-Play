<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch Recipes</title>
<style>
  body {
    margin:0; padding:20px; font-family:Arial,sans-serif; position:relative; min-height:100vh; transition:color 0.3s;
  }
  body::before {
    content:""; position:fixed; top:0; left:0; width:100%; height:100%;
    background: url("lunch.jpg") no-repeat center center/cover;
    filter: blur(5px) brightness(0.9); z-index:-1; transition: filter 0.3s, background-color 0.3s;
  }
  h1 { color:#fff; text-shadow:2px 2px 5px rgba(0,0,0,0.6);}
  .container { text-align:center; position:relative; z-index:1;}
  .items { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:20px; margin-top:60px;}
  .item { background:rgba(255,255,255,0.85); padding:20px; border-radius:10px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.3); transition:transform 0.2s,background 0.3s;}
  .item:hover { transform:scale(1.05); background:rgba(255,250,240,0.95);}
  a { display:inline-block; margin-top:20px; color:#fff; text-decoration:none; font-weight:bold; text-shadow:1px 1px 3px rgba(0,0,0,0.6);}
  .search-container { position:fixed; top:10px; left:10px; z-index:1000; }
  #searchBar { padding:8px 12px; width:200px; border-radius:5px; border:1px solid #ccc; font-size:14px; }

  /* Dark Mode */
  .dark-mode::before { background-color: rgba(0,0,0,0.4); filter: blur(5px) brightness(0.6);}
  .dark-mode h1 { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
  .dark-mode .item { background: rgba(50,50,50,0.8); color:#fff;}
  .dark-mode .item:hover { background: rgba(70,70,70,0.85);}
  .dark-mode a { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
</style>
</head>
<body>

<div class="container">
  <h1>🍴 Lunch Recipes</h1>

  <!-- Search -->
  <div class="search-container">
    <input type="text" id="searchBar" placeholder="Search lunch..." onkeyup="searchLunch()">
  </div>

  <!-- Recipe List -->
  <div id="lunchList" class="items"></div>

  <a href="home.html" onclick="playClick()">⬅ Back to Home</a>
</div>

<audio id="click-sound" src="click.mp3" preload="auto"></audio>

<script>
const lunchRecipes = {
  pasta: { title:"Pasta", img:"lunch.jpg" },
  friedrice: { title:"Fried Rice", img:"lunch.jpg" },
  salad: { title:"Salad", img:"lunch.jpg" },
  biryani: { title:"Biryani", img:"lunch.jpg" },
  meals: { title:"Meals", img:"lunch.jpg" },
  chickencurry: { title:"Chicken Curry", img:"lunch.jpg" },
  paneerbuttermasala: { title:"Paneer Butter Masala", img:"lunch.jpg" },
  daltadka: { title:"Dal Tadka", img:"lunch.jpg" },
  jeerarice: { title:"Jeera Rice", img:"lunch.jpg" },
  vegbiryani: { title:"Veg Biryani", img:"lunch.jpg" },
  chickenbiryani: { title:"Chicken Biryani", img:"lunch.jpg" },
  vegpulao: { title:"Veg Pulao", img:"lunch.jpg" },
  mutterpaneer: { title:"Mutter Paneer", img:"lunch.jpg" },
  rajma: { title:"Rajma", img:"lunch.jpg" },
  chole: { title:"Chole", img:"lunch.jpg" },
  fishcurry: { title:"Fish Curry", img:"lunch.jpg" },
  eggcurry: { title:"Egg Curry", img:"lunch.jpg" },
  aloogobi: { title:"Aloo Gobi", img:"lunch.jpg" },
  mixveg: { title:"Mix Veg", img:"lunch.jpg" },
  naan: { title:"Naan", img:"lunch.jpg" },
  roti: { title:"Roti", img:"lunch.jpg" },
  chickenfry: { title:"Chicken Fry", img:"lunch.jpg" },
  vegcutlet: { title:"Veg Cutlet", img:"lunch.jpg" }
};

// Populate dynamically
const lunchList = document.getElementById("lunchList");
for(let key in lunchRecipes){
  const recipe = lunchRecipes[key];
  const div = document.createElement("div");
  div.className = "item";
  div.textContent = recipe.title;
  div.onclick = ()=>{ playClick(); openRecipe(key); };
  lunchList.appendChild(div);
}

// Search function
function searchLunch(){
  const input = document.getElementById("searchBar").value.toLowerCase();
  const items = document.querySelectorAll('#lunchList .item');
  items.forEach(item => {
    const name = item.textContent.toLowerCase();
    item.style.display = name.includes(input) ? "block" : "none";
  });
}

// Click & Open
function playClick(){
  const sound = document.getElementById("click-sound");
  sound.currentTime=0;
  sound.play();
}
function openRecipe(item){
  localStorage.setItem("selectedRecipe", item);
  window.location.href="recipe.html";
}

// Dark mode
if(localStorage.getItem("theme")==="dark"){ document.body.classList.add("dark-mode"); }

</script>
<script src="dark-mode.js"></script>
</body>
</html>
