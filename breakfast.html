<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakfast Recipes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
    background: url('breakfast.webp') no-repeat center center fixed;
    background-size: cover;
    position: relative;
    transition: color 0.3s;
  }

  body::after {
    content: "";
    position: fixed;
    top:0; left:0;
    width: 100%; height: 100%;
    backdrop-filter: blur(3px);
    background-color: rgba(255,255,255,0.15);
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  h1 { color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.6); }

  .items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 20px;
    margin-top: 60px;
  }

  .item {
    background: rgba(255,255,255,0.85);
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.2s, background 0.3s;
  }

  .item:hover {
    transform: scale(1.05);
    background: rgba(255,250,240,0.95);
  }

  a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #4CAF50;
    color:white;
    text-decoration:none;
    border-radius:6px;
  }

  a:hover { background:#45a049; }

  .search-container {
    position: fixed;
    top:10px;
    left:10px;
    z-index: 1000;
  }

  #searchBar {
    padding:8px 12px;
    width:200px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
  }

  /* Dark mode */
  .dark-mode::after { background-color: rgba(0,0,0,0.4); filter: blur(5px) brightness(0.6);}
  .dark-mode h1 { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
  .dark-mode .item { background: rgba(50,50,50,0.8); color:#fff;}
  .dark-mode .item:hover { background: rgba(70,70,70,0.85);}
  .dark-mode a { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
</style>
</head>
<body>

<div class="container">
  <h1>🍳 Breakfast Recipes</h1>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="searchBar" placeholder="Search breakfast recipes..." onkeyup="searchBreakfast()">
  </div>

  <!-- Recipe List -->
  <div id="breakfastList" class="items"></div>

  <a href="home.html" onclick="playClick()">⬅ Back to Home</a>
</div>

<audio id="click-sound" src="click.mp3" preload="auto"></audio>

<script>
// Breakfast recipes object
const breakfastRecipes = {
  pancakes: { title: "Pancakes", img: "breakfast.webp" },
  omelette: { title: "Omelette", img: "breakfast.webp" },
  sandwich: { title: "Sandwich", img: "breakfast.webp" },
  chapathi: { title: "Chapathi", img: "breakfast.webp" },
  pongal: { title: "Pongal", img: "breakfast.webp" },
  idli: { title: "Idli", img: "breakfast.webp" },
  dosa: { title: "Dosa", img: "breakfast.webp" },
  poha: { title: "Poha", img: "breakfast.webp" },
  upma: { title: "Upma", img: "breakfast.webp" },
  paratha: { title: "Paratha", img: "breakfast.webp" },
  "bread-toast": { title: "Bread Toast", img: "breakfast.webp" },
  smoothie: { title: "Fruit Smoothie", img: "breakfast.webp" },
  cereal: { title: "Cereal & Milk", img: "breakfast.webp" },
  oats: { title: "Oats Porridge", img: "breakfast.webp" },
  uttapam: { title: "Uttapam", img: "breakfast.webp" },
  vada: { title: "Medu Vada", img: "breakfast.webp" },
  tea: { title: "Masala Chai", img: "breakfast.webp" },
  coffee: { title: "Filter Coffee", img: "breakfast.webp" }
};

// Populate items dynamically
const breakfastList = document.getElementById('breakfastList');
for (let key in breakfastRecipes){
  const recipe = breakfastRecipes[key];
  const div = document.createElement('div');
  div.className = "item";
  div.textContent = recipe.title;
  div.onclick = () => { playClick(); openRecipe(key); };
  breakfastList.appendChild(div);
}

// Search function
function searchBreakfast(){
  const input = document.getElementById('searchBar').value.toLowerCase();
  const items = document.querySelectorAll('#breakfastList .item');
  items.forEach(item => {
    const name = item.textContent.toLowerCase();
    item.style.display = name.includes(input) ? "block" : "none";
  });
}

// Click sound and navigation
function playClick(){
  const sound = document.getElementById("click-sound");
  sound.currentTime = 0;
  sound.play();
}

function openRecipe(item){
  localStorage.setItem("selectedRecipe", item);
  window.location.href = "recipe.html";
}

// Dark mode
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark-mode");
}
</script>

<script src="dark-mode.js"></script>
</body>
</html>
