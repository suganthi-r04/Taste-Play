<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desserts</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
    position: relative;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Background Image */
  body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: url("dessert.jpg") no-repeat center center/cover;
    filter: blur(5px) brightness(0.9);
    z-index: -1;
  }

  h1 {
    margin: 20px 0;
    color: #fff;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
  }

  .items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 20px;
    margin-top: 60px;
  }

  .item {
    background: rgba(255,255,255,0.85);
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.2s, background 0.3s;
  }

  .item:hover {
    transform: scale(1.05);
    background: rgba(255,240,245,0.95);
  }

  a {
    display:inline-block;
    margin-top: 20px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    text-shadow:1px 1px 3px rgba(0,0,0,0.6);
    cursor:pointer;
  }

  .search-container {
    position: fixed;
    top:10px;
    left:10px;
    z-index: 1000;
  }

  #searchBar {
    padding:8px 12px;
    width:200px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
  }

  /* Dark mode */
  .dark-mode::before { background-color: rgba(0,0,0,0.4); filter: blur(5px) brightness(0.6);}
  .dark-mode h1 { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
  .dark-mode .item { background: rgba(50,50,50,0.8); color:#fff;}
  .dark-mode .item:hover { background: rgba(70,70,70,0.85);}
  .dark-mode a { color:#ffcc00; text-shadow:1px 1px 2px rgba(0,0,0,0.7);}
</style>
</head>
<body>

<h1>🍨 Desserts</h1>

<!-- Search Bar -->
<div class="search-container">
  <input type="text" id="searchBar" placeholder="Search desserts..." onkeyup="searchDesserts()">
</div>

<!-- Recipe List -->
<div id="dessertList" class="items"></div>

<a href="home.html" onclick="playClick()">⬅ Back to Home</a>

<audio id="click-sound" src="click.mp3" preload="auto"></audio>

<script>
// Dessert recipes object
const dessertRecipes = {
  cake: { title: "Cake", img: "dessert.jpg" },
  icecream: { title: "Ice Cream", img: "dessert.jpg" },
  pudding: { title: "Pudding", img: "dessert.jpg" },
  brownie: { title: "Brownie", img: "dessert.jpg" },
  cupcake: { title: "Cupcake", img: "dessert.jpg" },
  gulabjamun: { title: "Gulab Jamun", img: "dessert.jpg" },
  rasgulla: { title: "Rasgulla", img: "dessert.jpg" },
  jalebi: { title: "Jalebi", img: "dessert.jpg" },
  kheer: { title: "Kheer", img: "dessert.jpg" },
  laddu: { title: "Laddu", img: "dessert.jpg" },
  barfi: { title: "Barfi", img: "dessert.jpg" },
  applepie: { title: "Apple Pie", img: "dessert.jpg" },
  cheesecake: { title: "Cheesecake", img: "dessert.jpg" },
  donut: { title: "Donut", img: "dessert.jpg" },
  mousse: { title: "Chocolate Mousse", img: "dessert.jpg" },
  halwa: { title: "Carrot Halwa", img: "dessert.jpg" }
};

// Populate dessert items dynamically
const dessertList = document.getElementById('dessertList');
for (let key in dessertRecipes){
  const recipe = dessertRecipes[key];
  const div = document.createElement('div');
  div.className = "item";
  div.textContent = recipe.title;
  div.onclick = () => { playClick(); openRecipe(key); };
  dessertList.appendChild(div);
}

// Search function
function searchDesserts(){
  const input = document.getElementById('searchBar').value.toLowerCase();
  const items = document.querySelectorAll('#dessertList .item');
  items.forEach(item => {
    const name = item.textContent.toLowerCase();
    item.style.display = name.includes(input) ? "block" : "none";
  });
}

// Click sound & open recipe
function playClick(){
  const sound = document.getElementById("click-sound");
  sound.currentTime = 0;
  sound.play();
}

function openRecipe(item){
  localStorage.setItem("selectedRecipe", item);
  window.location.href = "recipe.html";
}

// Dark mode
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark-mode");
}
</script>

<script src="dark-mode.js"></script>
</body>
</html>
