<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  min-height: 100vh;
  text-align: center;
  background: url('food3.jpg') no-repeat center center fixed;
  background-size: cover;
  position: relative;
}

body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(5px);
  background-color: rgba(255, 255, 255, 0.15);
  pointer-events: none;
  z-index: 0;
}

body > * {
  position: relative;
  z-index: 1;
}

.container {
  background: rgba(255, 255, 255, 0.85);
  padding: 25px 30px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  max-width: 600px;
  width: 90%;
  position: relative;
}

h1, h2, li, p {
  margin: 10px 0;
}

.description {
  background: #fff3f3;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  text-align: justify;
}

.btn {
  padding: 10px 20px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 20px;
}

.btn:hover {
  background-color: #45a049;
}

#favorite-btn {
  font-size: 32px;
  cursor: pointer;
  margin-left: 10px;
  vertical-align: middle;
  color: gray;
  transition: color 0.3s, transform 0.2s;
}

#favorite-btn.favorited {
  color: red;
}

#favorite-btn:hover {
  transform: scale(1.2);
}

/* Transparent Dark Mode Overlay */
.dark-mode::before {
  background-color: rgba(0,0,0,0.4);
  filter: blur(5px) brightness(0.6);
}

.dark-mode h1 { color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
.dark-mode .item { background: rgba(50,50,50,0.8); color: #fff; }
.dark-mode .item:hover { background: rgba(70,70,70,0.85); }
.dark-mode a { color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
</style>
</head>

// ------------------- PAGE LOGIC -------------------
window.addEventListener("DOMContentLoaded", () => {
  const recipeId = localStorage.getItem("selectedRecipe");
  const recipeNameEl = document.getElementById("recipe-name");
  const ingredientsEl = document.getElementById("ingredients");
  const stepsEl = document.getElementById("steps");
  const favoriteBtn = document.getElementById("favorite-btn");
  const descriptionEl = document.getElementById("description");

  if (recipeId && recipes[recipeId]) {
    // Display recipe data
    recipeNameEl.textContent = recipes[recipeId].title;
    ingredientsEl.innerHTML = recipes[recipeId].ingredients.map(i => `<li>${i}</li>`).join("");
    stepsEl.innerHTML = recipes[recipeId].steps.map(s => `<li>${s}</li>`).join("");
    descriptionEl.innerHTML = recipes[recipeId].description.replace(/\n/g, "<br>");

    // Handle favorite toggle
    let favorites = JSON.parse(localStorage.getItem("favoriteRecipes") || "[]");
    if (favorites.includes(recipeId)) {
      favoriteBtn.classList.add("favorited");
      favoriteBtn.textContent = "❤️";
    } else {
      favoriteBtn.classList.remove("favorited");
      favoriteBtn.textContent = "🤍";
    }

    favoriteBtn.addEventListener("click", () => {
      playClick(); // click sound
      let favs = JSON.parse(localStorage.getItem("favoriteRecipes") || "[]");
      if (favs.includes(recipeId)) {
        favs = favs.filter(id => id !== recipeId);
        favoriteBtn.classList.remove("favorited");
        favoriteBtn.textContent = "🤍";
      } else {
        favs.push(recipeId);
        favoriteBtn.classList.add("favorited");
        favoriteBtn.textContent = "❤️";
      }
      localStorage.setItem("favoriteRecipes", JSON.stringify(favs));
    });

  } else {
    recipeNameEl.textContent = "Recipe not found";
    favoriteBtn.style.display = "none";
    descriptionEl.textContent = "";
  }
});

// Go back to home page
function goHome() {
  playClick();  // play click sound
  window.location.href = "home.html";
}

// Used by game pages
function openRecipe(recipeId) {
  localStorage.setItem("selectedRecipe", recipeId);
  window.location.href = "recipe.html";
}

<!-- jsPDF library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<script>
document.getElementById("download-pdf-btn").addEventListener("click", function () {
    const recipeTitle = document.getElementById("recipe-name").innerText;
    
    // Gather ingredients, steps, and description
    const ingredients = Array.from(document.querySelectorAll("#ingredients li")).map(li => "- " + li.innerText).join("\n");
    const steps = Array.from(document.querySelectorAll("#steps li")).map((li, i) => (i+1) + ". " + li.innerText).join("\n");
    const description = document.getElementById("description").innerText;

    const recipeContent = "Ingredients:\n" + ingredients + "\n\nSteps:\n" + steps + "\n\nDescription:\n" + description;

    // Create PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text(recipeTitle, 10, 20);

    doc.setFontSize(12);
    const splitContent = doc.splitTextToSize(recipeContent, 180);
    doc.text(splitContent, 10, 30);

    // Save PDF
    doc.save(`${recipeTitle}.pdf`);
});

    

</script>
